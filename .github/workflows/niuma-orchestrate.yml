name: niuma - Orchestrate

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]
  schedule:
    - cron: '*/5 * * * *'

permissions:
  issues: write
  contents: read

jobs:
  orchestrate:
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'bot:orchestrate') ||
      github.event_name == 'schedule'
    uses: biantaishabi2/Cli/.github/workflows/niuma-orchestrate-reusable.yml@master
    with:
      repo: ${{ github.repository }}
      build_niuma: false
      enable_local_cleanup: true
    secrets: inherit

  close-after-integration-merge:
    runs-on: self-hosted
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'integration/')
    permissions:
      issues: write
      pull-requests: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.NIUMA_PAT }}

      - name: Close Sub/Parent Issues After Integration Merge
        env:
          GITHUB_TOKEN: ${{ secrets.NIUMA_PAT }}
          REPO: ${{ github.repository }}
          WORKSPACE: ${{ github.workspace }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          niuma control close-merged \
            --repo "$REPO" \
            --repo-dir "$WORKSPACE" \
            --pr "$PR_NUMBER"
