name: niuma - Review

on:
  issues:
    types: [labeled]

concurrency:
  group: niuma-review-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: self-hosted
    if: github.event.label.name == 'bot:pr-created'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Find PR Number
        id: find_pr
        env:
          GITHUB_TOKEN: ${{ secrets.NIUMA_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(gh api --paginate "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("BOT:PR_CREATED")) | .body' \
            | sed -n 's/.*pr=\([0-9]\+\).*/\1/p' | tail -1)
          if [ -z "$PR_NUMBER" ]; then
            echo "::warning::未在 issue #${ISSUE_NUMBER} 的评论中找到 PR 号"
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: AI Self-Review
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.NIUMA_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          niuma review \
            --repo "$REPO" \
            --issue "$ISSUE_NUMBER" \
            --pr "$PR_NUMBER"
