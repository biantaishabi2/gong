name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      gate_mode:
        description: "门禁模式: bdd-only(默认) / legacy(全量回退) / strict(发布前全量)"
        required: false
        default: "bdd-only"
        type: choice
        options:
          - bdd-only
          - legacy
          - strict

env:
  MIX_ENV: test
  ERL_FLAGS: "+S 4:4"
  # 防止 git fetch 挂起：30 秒内速度低于 1000 bytes/s 则中断
  GIT_HTTP_LOW_SPEED_LIMIT: "1000"
  GIT_HTTP_LOW_SPEED_TIME: "30"
  # 使用 git protocol v2 加速大仓库克隆协商
  GIT_PROTOCOL_VERSION: "2"

jobs:
  # 变更检测：识别 session / docs-only / other 三类变更
  detect-changes:
    name: 变更检测
    runs-on: ubuntu-latest
    outputs:
      session: ${{ steps.filter.outputs.session }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      gate_mode: ${{ steps.mode.outputs.gate_mode }}
    steps:
      - uses: actions/checkout@v4

      - name: 确定门禁模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "gate_mode=${{ inputs.gate_mode }}" >> $GITHUB_OUTPUT
          else
            echo "gate_mode=bdd-only" >> $GITHUB_OUTPUT
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            session:
              - 'lib/gong/session.ex'
              - 'lib/gong/session/**'
              - 'docs/bdd/session_edge.dsl'
              - 'docs/bdd/tape_session.dsl'
              - 'test/bdd_generated/session_edge_generated_test.exs'
              - 'test/bdd_generated/tape_session_generated_test.exs'
            docs_only:
              - 'docs/**'
              - '!docs/bdd/**'
              - 'README.md'
              - 'CHANGELOG.md'

  bdd-smoke:
    name: BDD Smoke 门禁
    runs-on: ubuntu-latest
    needs: detect-changes
    # docs-only 变更在 bdd-only 模式下跳过
    if: >
      !(needs.detect-changes.outputs.gate_mode == 'bdd-only' &&
        needs.detect-changes.outputs.docs_only == 'true' &&
        needs.detect-changes.outputs.session == 'false')

    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: 安装 Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.17"

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: 安装依赖
        timeout-minutes: 5
        run: |
          git config --global protocol.version 2
          for i in 1 2 3; do
            timeout 120 mix deps.get && break
            echo "::warning::mix deps.get 第 ${i} 次失败，清理 partial clone 后重试..."
            rm -rf deps/jido_ai
            sleep 5
          done

      - name: 安装 bddc（若缺失）
        run: |
          if command -v bddc >/dev/null 2>&1; then
            bddc --help >/dev/null
            exit 0
          fi
          git clone --depth=1 https://github.com/biantaishabi2/Cli.git /tmp/cli
          cd /tmp/cli/compiler/bddc
          mix deps.get
          MIX_ENV=prod mix escript.build
          sudo install -m 0755 bdd_compiler /usr/local/bin/bdd_compiler
          sudo ln -sfn /usr/local/bin/bdd_compiler /usr/local/bin/bddc

      - name: 生成 BDD 测试
        run: bddc compile

      - name: 规范化 BDD 生成路径
        run: ./scripts/normalize_bdd_generated_paths.sh

      - name: 检查 BDD 生成文件已同步
        run: git diff --exit-code -- test/bdd_generated docs/bdd/_generated/runtime_caps_v1.exs

      - name: 编译检查
        run: mix compile --warnings-as-errors

      - name: BDD Smoke 测试
        run: mix test test/bdd_generated/ --trace --only smoke --exclude e2e

  bdd-full:
    name: BDD Full 门禁
    runs-on: ubuntu-latest
    needs: [detect-changes, bdd-smoke]

    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: 安装 Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.17"

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: 安装依赖
        timeout-minutes: 5
        run: |
          git config --global protocol.version 2
          for i in 1 2 3; do
            timeout 120 mix deps.get && break
            echo "::warning::mix deps.get 第 ${i} 次失败，清理 partial clone 后重试..."
            rm -rf deps/jido_ai
            sleep 5
          done

      - name: 安装 bddc（若缺失）
        run: |
          if command -v bddc >/dev/null 2>&1; then
            bddc --help >/dev/null
            exit 0
          fi
          git clone --depth=1 https://github.com/biantaishabi2/Cli.git /tmp/cli
          cd /tmp/cli/compiler/bddc
          mix deps.get
          MIX_ENV=prod mix escript.build
          sudo install -m 0755 bdd_compiler /usr/local/bin/bdd_compiler
          sudo ln -sfn /usr/local/bin/bdd_compiler /usr/local/bin/bddc

      - name: 生成 BDD 测试
        run: bddc compile

      - name: 规范化 BDD 生成路径
        run: ./scripts/normalize_bdd_generated_paths.sh

      - name: 检查 BDD 生成文件已同步
        run: git diff --exit-code -- test/bdd_generated docs/bdd/_generated/runtime_caps_v1.exs

      - name: 编译检查
        run: mix compile --warnings-as-errors

      # bdd-only 模式 + session 变更：只跑 session 相关测试
      - name: BDD Session 测试
        if: >
          needs.detect-changes.outputs.gate_mode == 'bdd-only' &&
          needs.detect-changes.outputs.session == 'true'
        run: |
          mix test test/bdd_generated/session_edge_generated_test.exs \
                   test/bdd_generated/tape_session_generated_test.exs \
                   --trace --exclude e2e --exclude smoke --exclude quarantine

      # 非 session 变更或 legacy/strict 模式：跑全量（排除 quarantine）
      - name: BDD Full 测试（主路径）
        if: >
          needs.detect-changes.outputs.gate_mode != 'bdd-only' ||
          needs.detect-changes.outputs.session == 'false'
        run: |
          mix test test/bdd_generated/ --trace --exclude e2e --exclude smoke --exclude quarantine

      # quarantine 用例：隔离运行，失败不阻断
      - name: BDD Quarantine 测试（隔离）
        id: quarantine
        continue-on-error: true
        run: |
          mix test test/bdd_generated/ --trace --only quarantine --max-failures 10 2>&1 || true

      - name: Quarantine 失败告警
        if: steps.quarantine.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::warning::Quarantine 用例失败，已降级为告警"

  e2e:
    name: E2E 真实 LLM 测试
    runs-on: ubuntu-latest
    needs: bdd-full
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.17"

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: 安装依赖
        timeout-minutes: 5
        run: |
          git config --global protocol.version 2
          for i in 1 2 3; do
            timeout 120 mix deps.get && break
            echo "::warning::mix deps.get 第 ${i} 次失败，清理 partial clone 后重试..."
            rm -rf deps/jido_ai
            sleep 5
          done

      - name: E2E 测试
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY 未配置，跳过 E2E 测试"
            exit 0
          fi
          mix test test/bdd_generated/ --include e2e --trace
