name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      gate_mode:
        description: "门禁模式: bdd-only(默认) / legacy(全量回退) / strict(发布前全量)"
        required: false
        default: "bdd-only"
        type: choice
        options:
          - bdd-only
          - legacy
          - strict

env:
  MIX_ENV: test
  ERL_FLAGS: "+S 4:4"

jobs:
  # 变更检测：识别 session / docs-only / other 三类变更
  detect-changes:
    name: 变更检测
    runs-on: ubuntu-latest
    outputs:
      session: ${{ steps.filter.outputs.session }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      gate_mode: ${{ steps.mode.outputs.gate_mode }}
    steps:
      - uses: actions/checkout@v4

      - name: 确定门禁模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "gate_mode=${{ inputs.gate_mode }}" >> $GITHUB_OUTPUT
          else
            echo "gate_mode=bdd-only" >> $GITHUB_OUTPUT
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            session:
              - 'lib/gong/session.ex'
              - 'lib/gong/session/**'
              - 'docs/bdd/session_edge.dsl'
              - 'docs/bdd/tape_session.dsl'
              - 'test/bdd_generated/session_edge_generated_test.exs'
              - 'test/bdd_generated/tape_session_generated_test.exs'
            docs_only:
              - 'docs/**'
              - '!docs/bdd/**'
              - 'README.md'
              - 'CHANGELOG.md'

  bdd-smoke:
    name: BDD Smoke 门禁
    runs-on: ubuntu-latest
    needs: detect-changes
    # docs-only 变更在 bdd-only 模式下跳过
    if: >
      !(needs.detect-changes.outputs.gate_mode == 'bdd-only' &&
        needs.detect-changes.outputs.docs_only == 'true' &&
        needs.detect-changes.outputs.session == 'false')

    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: 安装 Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.17"

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: 安装依赖
        run: mix deps.get

      - name: 安装 bddc（若缺失）
        run: |
          if command -v bddc >/dev/null 2>&1; then
            bddc --help >/dev/null
            exit 0
          fi
          git clone --depth=1 https://github.com/biantaishabi2/Cli.git /tmp/cli
          cd /tmp/cli/compiler/bddc
          mix deps.get
          MIX_ENV=prod mix escript.build
          sudo install -m 0755 bdd_compiler /usr/local/bin/bdd_compiler
          sudo ln -sfn /usr/local/bin/bdd_compiler /usr/local/bin/bddc

      - name: 生成 BDD 测试
        run: bddc compile

      - name: 规范化 BDD 生成路径
        run: ./scripts/normalize_bdd_generated_paths.sh

      - name: 检查 BDD 生成文件已同步
        run: git diff --exit-code -- test/bdd_generated docs/bdd/_generated/runtime_caps_v1.exs

      - name: 编译检查
        run: mix compile --warnings-as-errors

      - name: BDD Smoke 测试
        run: mix test test/bdd_generated/ --trace --only smoke --exclude e2e

  bdd-full:
    name: BDD Full 门禁
    runs-on: ubuntu-latest
    needs: [detect-changes, bdd-smoke]

    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: 安装 Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.17"

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: 安装依赖
        run: mix deps.get

      - name: 安装 bddc（若缺失）
        run: |
          if command -v bddc >/dev/null 2>&1; then
            bddc --help >/dev/null
            exit 0
          fi
          git clone --depth=1 https://github.com/biantaishabi2/Cli.git /tmp/cli
          cd /tmp/cli/compiler/bddc
          mix deps.get
          MIX_ENV=prod mix escript.build
          sudo install -m 0755 bdd_compiler /usr/local/bin/bdd_compiler
          sudo ln -sfn /usr/local/bin/bdd_compiler /usr/local/bin/bddc

      - name: 生成 BDD 测试
        run: bddc compile

      - name: 规范化 BDD 生成路径
        run: ./scripts/normalize_bdd_generated_paths.sh

      - name: 检查 BDD 生成文件已同步
        run: git diff --exit-code -- test/bdd_generated docs/bdd/_generated/runtime_caps_v1.exs

      - name: 编译检查
        run: mix compile --warnings-as-errors

      # bdd-only 模式 + session 变更：只跑 session 相关测试
      - name: BDD Session 测试
        if: >
          needs.detect-changes.outputs.gate_mode == 'bdd-only' &&
          needs.detect-changes.outputs.session == 'true'
        run: |
          mix test test/bdd_generated/session_edge_generated_test.exs \
                   test/bdd_generated/tape_session_generated_test.exs \
                   --trace --exclude e2e --exclude smoke --exclude quarantine

      # 非 session 变更或 legacy/strict 模式：跑全量（排除 quarantine）
      - name: BDD Full 测试（主路径）
        if: >
          needs.detect-changes.outputs.gate_mode != 'bdd-only' ||
          needs.detect-changes.outputs.session == 'false'
        run: |
          mix test test/bdd_generated/ --trace --exclude e2e --exclude smoke --exclude quarantine

      # quarantine 用例：隔离运行，重试最多 2 次
      # strict 模式下失败阻断；其他模式下降级为告警
      - name: BDD Quarantine 测试（隔离）
        id: quarantine
        continue-on-error: ${{ needs.detect-changes.outputs.gate_mode != 'strict' }}
        run: |
          max_retries=2
          attempt=0
          while [ $attempt -lt $max_retries ]; do
            attempt=$((attempt + 1))
            echo "::group::Quarantine 第 ${attempt} 次运行"
            if mix test test/bdd_generated/ --trace --only quarantine --max-failures 10; then
              echo "::endgroup::"
              echo "quarantine_passed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "::endgroup::"
            if [ $attempt -lt $max_retries ]; then
              echo "::warning::Quarantine 第 ${attempt} 次失败，重试中..."
            fi
          done
          echo "quarantine_passed=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Quarantine 失败告警 & 创建追踪 issue
        if: steps.quarantine.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::warning::Quarantine 用例失败（重试 2 次后仍失败），已降级为告警"
          # 检查是否已有同名 open issue，避免重复创建
          existing=$(gh issue list --label "quarantine,P2" --state open --limit 1 --json number -q '.[0].number' 2>/dev/null || true)
          if [ -z "$existing" ]; then
            gh issue create \
              --title "Quarantine 用例持续失败 (CI #${{ github.run_number }})" \
              --label "quarantine,P2" \
              --body "## Quarantine 用例失败

          CI 运行 [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) 中 quarantine 用例重试 2 次后仍然失败。

          **SLA**: 7 个工作日内修复或移除 quarantine 标记。连续 3 次迭代未修复应升级为阻断。

          **触发分支**: \`${{ github.head_ref || github.ref_name }}\`
          **触发者**: @${{ github.actor }}"
          else
            echo "已存在 quarantine 追踪 issue #${existing}，跳过创建"
          fi

  e2e:
    name: E2E 真实 LLM 测试
    runs-on: ubuntu-latest
    needs: bdd-full
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.17"

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: 安装依赖
        run: mix deps.get

      - name: E2E 测试
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY 未配置，跳过 E2E 测试"
            exit 0
          fi
          mix test test/bdd_generated/ --include e2e --trace
