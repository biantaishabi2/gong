name: niuma - Discussion Check

on:
  issue_comment:
    types: [created]

concurrency:
  group: niuma-discuss-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  discussion-check:
    runs-on: self-hosted
    if: github.event.issue.pull_request == null
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # 事件驱动：Issue 评论触发（仅在讨论状态）
      - name: Check Discussion
        env:
          GITHUB_TOKEN: ${{ secrets.NIUMA_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels -q '.labels[].name')
          if echo "$LABELS" | grep -q "bot:needs-discussion"; then
            niuma discuss \
              --repo "$REPO" \
              --issue "$ISSUE_NUMBER" || true
          fi
