ai:
  default: claude
  
  providers:
    # Claude Code
    claude:
      cmd: "cat {prompt_file} | CLAUDECODE= claude -p --output-format text --max-budget-usd 10 --permission-mode acceptEdits --add-dir {workdir}"
    
    # OpenAI Codex（需要 OPENAI_API_KEY）
    codex:
      cmd: "codex exec --sandbox workspace-write -C {workdir} - < {prompt_file}"
      cmd_agent: "codex exec --sandbox workspace-write -C {workdir} - < {prompt_file}"
    
    # Kimi（Moonshot AI）
    kimi:
      cmd: "cat {prompt_file} | kimi --print --input-format text --output-format text --final-message-only -w {workdir}"
  
  # 讨论阶段：多 provider 左右互搏
  discussion:
    providers:
      - codex
      - kimi
    consolidator: codex
  
  # 实现阶段：切换 provider 只需改这里
  # 可选: claude | codex | kimi
  implementation:
    provider: claude

workflow:
  max_iterate_rounds: 10
  allowed_prefixes:
    - "automation/"

label_guard:
  allowlist:
    - "github-actions[bot]"
    - "niuma-bot"
    - "biantaishabi2"
  mode: "dry-run"
